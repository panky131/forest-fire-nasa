name: Build Expo APK with CNG

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: 20

jobs:
  install-deps:
    runs-on: ubuntu-latest

    outputs:
      node-modules-cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Verify Node version
        run: node -v

      - name: Install dependencies
        run: npm ci

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=node-modules-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}

  build-apk:
    runs-on: ubuntu-latest
    needs: install-deps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Verify Node version
        run: node -v

      - name: Setup JDK for Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Expo Prebuild (CNG)
        run: npx expo prebuild --platform android --non-interactive

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FOREST-FIRE-UTTARAKHAND
          path: android/app/build/outputs/apk/release/app-release.apk

  verify-apk:
    runs-on: ubuntu-latest
    needs: build-apk

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: FOREST-FIRE-UTTARAKHAND

      - name: Verify APK
        run: |
          ls -lh
          test -f app-release.apk && echo "✅ APK verified"